<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSAC - Enfermedades Huérfanas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: #060b23; /* Color sólido de respaldo */
  min-height: 100vh;
  overflow-x: hidden;
}

/* App */
.app {
  width: 100%;
  min-height: 100vh;
  position: relative;
  color: white;
  padding-bottom: 50px;
  background:
    linear-gradient(rgba(6,11,35,0.85), rgba(11,31,79,0.95)),
    url('fondo.jpg') no-repeat center center / cover fixed;
}

/* Animaciones */
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 1s ease forwards;
}
.fade-in.delay-1 { animation-delay: 0.3s; }
.fade-in.delay-2 { animation-delay: 0.6s; }
.fade-in.delay-3 { animation-delay: 0.9s; }

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 25px 50px;
}

.logo {
  height: 120px; /* Tamaño ajustado para laptops */
  filter: drop-shadow(0 0 10px rgba(56,189,248,0.4));
}

/* Contenedor */
.container {
  width: 100%;
  max-width: 1400px;
  margin: 0 auto;
  text-align: center;
  padding: 0 20px;
}

/* Título */
.title {
  font-size: clamp(32px, 5vw, 48px);
  font-weight: 700;
  margin-top: 20px;
  letter-spacing: 2px;
}

.subtitle {
  margin-top: 15px;
  opacity: 0.8;
  line-height: 1.6;
  max-width: 800px;
  margin-left: auto;
  margin-right: auto;
  font-size: 16px;
}

/* Stats */
.stats {
  display: flex;
  justify-content: center;
  align-items: stretch;
  gap: 20px;
  margin-top: 40px;
  flex-wrap: wrap;
}

/* KPI */
.kpi {
  padding: 25px;
  width: 260px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 30px rgba(56,189,248,0.3);
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.kpi span {
  font-size: 14px;
  opacity: 0.7;
  text-transform: uppercase;
}

.kpi h1 {
  font-size: 64px;
  color: #38BDF8;
}

/* Mini card */
.mini-card {
  width: 220px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 20px rgba(56,189,248,0.2);
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.mini-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 8px 0;
}

.mini-row strong {
  color: #38BDF8;
  font-size: 22px;
}

/* Cards */
.cards {
  display: flex;
  justify-content: center;
  gap: 25px;
  margin-top: 60px;
  flex-wrap: wrap;
}

.card {
  width: 260px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  text-decoration: none;
  color: white;
  text-align: center;
  transition: all 0.3s ease;
  border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer;
}

.card:hover {
  transform: translateY(-8px);
  background: rgba(56,189,248,0.1);
  box-shadow: 0 0 40px rgba(56,189,248,0.4);
  border: 1px solid rgba(56,189,248,0.5);
}

.icon img {
  width: 80px;
  height: 80px;
  margin-bottom: 20px;
}

/* Contenedor del Dashboard Embebido */
#dashboard-viewer {
  display: none;
  margin-top: 60px;
  padding: 20px;
  width: 100%;
  animation: fadeUp 0.8s ease forwards;
}

#dashboard-viewer iframe {
  width: 100%;
  height: 850px; /* Altura generosa para que quepa la advertencia de Google */
  border-radius: 25px;
  border: 2px solid rgba(56,189,248,0.3);
  box-shadow: 0 0 50px rgba(0,0,0,0.5);
}

.btn-cerrar {
  margin-top: 20px;
  padding: 12px 30px;
  background: #38BDF8;
  color: #060b23;
  border: none;
  border-radius: 50px;
  font-weight: 700;
  cursor: pointer;
  transition: 0.3s;
}

.btn-cerrar:hover {
  background: white;
  transform: scale(1.05);
}

/* Logo salud lateral */
.logo-salud-left {
  position: absolute;
  left: 20px;
  bottom: 40px;
  height: 100px;
  opacity: 0.7;
  filter: drop-shadow(0 0 10px rgba(56,189,248,0.4));
}
</style>

</head>

<body>

<div class="app">
  <img src="logoSalud.png" class="logo-salud-left">

  <div class="header fade-in">
    <img src="Logo_alcaldiaCali.png" class="logo">
    <img src="ODSC.png" class="logo">
  </div>

  <div class="container">
    <div class="title fade-in delay-1">ENFERMEDADES HUÉRFANAS</div>

    <div class="subtitle fade-in delay-1">
      Información relevante sobre el impacto de las enfermedades huérfanas en Santiago de Cali, apoyando la toma de decisiones y la sensibilización social.
    </div>

    <div class="stats fade-in delay-2">
      <div class="kpi">
        <span>Total casos</span>
        <h1>288</h1>
      </div>

      <div class="mini-card">
        <div class="mini-row">
          <span>Comuna</span>
          <strong>17</strong>
        </div>
        <div class="mini-row">
          <span>Casos</span>
          <strong>37</strong>
        </div>
      </div>
    </div>

    <div class="cards fade-in delay-3" id="main-cards">
      <div class="card" onclick="verDash('https://datastudio.google.com/embed/reporting/31c41886-75ab-4ada-8397-2ee1da2839c7/page/F5HYF')">
        <div class="icon"><img src="iconosocial.png"></div>
        <h3>Contexto Sociodemográfico</h3>
      </div>

      <div class="card" onclick="verDash('https://datastudio.google.com/embed/reporting/31c41886-75ab-4ada-8397-2ee1da2839c7/page/p_t6zv68ca2d')">
        <div class="icon"><img src="iconoespacial.png"></div>
        <h3>Distribución Espacial</h3>
      </div>

      <div class="card" onclick="verDash('https://datastudio.google.com/embed/reporting/31c41886-75ab-4ada-8397-2ee1da2839c7/page/p_mm6mc4aa2d')">
        <div class="icon"><img src="iconoinforme.png"></div>
        <h3>Informe Descriptivo</h3>
      </div>
    </div>

    <div id="dashboard-viewer">
        <iframe id="dash-frame" src="" allowfullscreen></iframe>
        <br>
        <button class="btn-cerrar" onclick="cerrarDash()">CERRAR TABLERO</button>
    </div>

  </div>
</div>

<script>
function verDash(url) {
    const viewer = document.getElementById('dashboard-viewer');
    const frame = document.getElementById('dash-frame');
    const cards = document.getElementById('main-cards');

    // Ocultar tarjetas para foco total
    cards.style.display = 'none';
    
    // Cargar URL y mostrar
    frame.src = url;
    viewer.style.display = 'block';

    // Desplazar suavemente al tablero
    viewer.scrollIntoView({ behavior: 'smooth' });
}

function cerrarDash() {
    const viewer = document.getElementById('dashboard-viewer');
    const frame = document.getElementById('dash-frame');
    const cards = document.getElementById('main-cards');

    viewer.style.display = 'none';
    cards.style.display = 'flex';
    frame.src = ""; // Limpiar para ahorrar memoria
}
</script>

</body>
</html>
